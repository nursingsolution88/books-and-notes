<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nursing Solution Store</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
}

header{
background:linear-gradient(135deg,#0d6efd,#00b4d8);
color:white;
padding:25px;
text-align:center;
}

header h1{
font-size:32px;
margin-bottom:10px;
}

.telegram-btn{
display:inline-block;
margin-top:10px;
padding:10px 20px;
background:white;
color:#0d6efd;
text-decoration:none;
border-radius:25px;
font-weight:bold;
}

.controls{
max-width:1200px;
margin:20px auto;
padding:0 15px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.controls input,
.controls select{
padding:12px;
border:1px solid #ccc;
border-radius:8px;
flex:1;
}

.books{
max-width:1200px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:320px;
object-fit:cover;
}

.content{
padding:15px;
}

.badge{
display:inline-block;
background:#198754;
color:white;
padding:5px 10px;
border-radius:20px;
font-size:12px;
margin-bottom:10px;
}

.price{
font-size:24px;
font-weight:bold;
color:#198754;
margin:10px 0;
}

.btn{
display:block;
text-align:center;
padding:12px;
border-radius:8px;
text-decoration:none;
margin-top:10px;
font-weight:bold;
}

.buy{
background:#0d6efd;
color:white;
}

.pdf{
background:#198754;
color:white;
}

footer{
background:#212529;
color:white;
text-align:center;
padding:20px;
margin-top:30px;
}
</style>

</head>

<body>

<header>
<h1>📚 Nursing Solution Store</h1>
<p>BSc Nursing | GNM | CHO Notes & Test Series</p>

<a class="telegram-btn"
href="https://t.me/nursingsolution88"
target="_blank">
Join Telegram </a>

</header>

<div class="controls">
<input type="text" id="searchBox" placeholder="🔍 Search Notes">

<select id="categoryFilter">
<option value="all">All Categories</option>
<option value="BSc Nursing">BSc Nursing</option>
<option value="GNM">GNM</option>
<option value="Test Series">Test Series</option>
</select>
</div>

<div class="books" id="books"></div>

<footer>
© Nursing Solution Store | Developed by SK Sir
</footer>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbw3Ap5_ZYch9LScqEEVeKJkkyInMAw2zcSoV5q7zAiIcvDLbDa_hpJ7QYXMgCCnM2v-/exec";

let allBooks=[];

async function loadBooks(){

try{

const response = await fetch(API_URL);
allBooks = await response.json();

displayBooks(allBooks);

}catch(error){

document.getElementById("books").innerHTML =
"<h2>Data Load Error</h2>";

console.error(error);

}

}

function displayBooks(books){

let html="";

books.forEach(book=>{

html += `

<div class="card">

<img src="${book.image}" alt="${book.title}">

<div class="content">

<span class="badge">${book.type}</span>

<h3>${book.title}</h3>

<p>${book.category}</p>

<div class="price">₹${book.price}</div>

<a class="btn buy"
href="https://rzp.io/rzp/j6fXuiS"
target="_blank">
Buy Now
</a>

<a class="btn pdf"
href="${book.pdf}"
target="_blank">
View PDF
</a>

</div>

</div>

`;

});

document.getElementById("books").innerHTML = html;

}

function filterBooks(){

const search =
document.getElementById("searchBox")
.value.toLowerCase();

const category =
document.getElementById("categoryFilter")
.value;

const filtered = allBooks.filter(book=>{

const matchSearch =
book.title.toLowerCase().includes(search);

const matchCategory =
category==="all" ||
book.category===category;

return matchSearch && matchCategory;

});

displayBooks(filtered);

}

document.getElementById("searchBox")
.addEventListener("input",filterBooks);

document.getElementById("categoryFilter")
.addEventListener("change",filterBooks);

loadBooks();

</script>

</body>
</html>
